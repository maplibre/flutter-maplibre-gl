name: Deploy Demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: "Build web demo"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: maplibre_gl_example
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: bluefireteam/melos-action@v3
        with:
          run-bootstrap: true
      - name: Build web
        run: flutter build web --release --base-href /flutter-maplibre-gl/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: maplibre_gl_example/build/web

  deploy:
    name: "Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
